name: macOS app

# Builds the Xerotier Agent .app and DMG. By default produces an ad-hoc-signed
# artifact (no Apple Developer ID needed). To ship a notarizable build, add the
# signing secrets below and the steps will use them.
on:
  workflow_dispatch:
    inputs:
      version:
        description: Marketing version (e.g. 0.1.0)
        default: "0.1.0"
  push:
    tags: ["app-v*"]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME#app-v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version || '0.1.0' }}" >> "$GITHUB_OUTPUT"
          fi

      # To sign + notarize, uncomment and provide repo secrets:
      #   APPLE_CERT_P12_BASE64, APPLE_CERT_PASSWORD, CODESIGN_IDENTITY,
      #   NOTARY_ISSUER_ID, NOTARY_KEY_ID, NOTARY_KEY_BASE64
      # then import the cert into a temp keychain and run notarytool store-credentials.

      - name: Build app
        working-directory: macos/app
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          BUILD: ${{ github.run_number }}
          # CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
        run: ./packaging/build-app.sh

      - name: Make DMG
        working-directory: macos/app
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          # NOTARY_PROFILE: xerotier-notary
        run: ./packaging/make-dmg.sh

      - uses: actions/upload-artifact@v4
        with:
          name: Xerotier-${{ steps.ver.outputs.version }}-dmg
          path: macos/app/dist/Xerotier-*.dmg
