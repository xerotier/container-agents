# SPDX-License-Identifier: MIT
# Xerotier Agent - XEM Execution Stack
#
# Deploys a single XEM (Execution Management) agent that enrolls
# with an already-running Xerotier router and dispatches
# infrastructure tool calls. Unlike the XIM inference agents this
# stack does not bundle a GPU or vLLM runtime -- the XEM agent is a
# lightweight text-only dispatcher.
#
# QUICK START:
#   1. Get a join key from your Xerotier dashboard:
#      Dashboard -> Infrastructure -> Agents -> Generate Join Key
#
#   2. Set your join key and router URL:
#      export XEROTIER_AGENT_JOIN_KEY=xjk_your_key_here
#      export XEROTIER_ROUTER_URL=https://router.example.com
#
#   3. Create host directories with correct permissions:
#      sudo mkdir -p /data/xerotier-xem/{tools,credentials,state,config}
#      sudo chown -R 5153:5153 /data/xerotier-xem
#
#   4. Start the agent:
#      docker compose -f docker-compose.agent-xem.yaml up -d
#
# ENVIRONMENT VARIABLES:
#   XEROTIER_AGENT_JOIN_KEY    [REQUIRED] Join key from Xerotier dashboard
#   XEROTIER_ROUTER_URL        [REQUIRED] HTTPS enrollment URL of the router
#   XEROTIER_AGENT_REGISTRATION_NAME
#                              [REQUIRED] Unique per-project name for this agent
#                              (kebab-case or alphanumeric, max 48 chars)
#   XEM_IMAGE                  Container image name
#                              (default: xerotier-xem:latest)
#   XEM_AGENT_LOG_LEVEL        Logging level: trace, debug, info, warning,
#                              error, critical (default: info)
#   XEM_AGENT_MAX_CONCURRENT   Max concurrent tool executions (default: 20)
#
# ENROLLMENT WORKFLOW:
#   - On first start the agent enrolls against the configured router
#   - The agent generates a persistent Ed25519 signing key on first run
#     and writes it to /var/lib/xem/.config/xerotier/agent-signing-key.hex
#     (mode 0600) so CURVE rotation acks survive restart.
#   - Subsequent restarts reuse the signing key; the router verifies
#     rotation acks against the enrolled public key.

services:
  xem-agent:
    image: ${XEM_IMAGE:-xerotier-xem:latest}
    container_name: xerotier-xem-agent
    restart: unless-stopped
    environment:
      # Enrollment [REQUIRED for first run]
      XEM_JOIN_KEY: ${XEROTIER_AGENT_JOIN_KEY:?XEROTIER_AGENT_JOIN_KEY is required}
      XEM_ROUTER_URL: ${XEROTIER_ROUTER_URL:?XEROTIER_ROUTER_URL is required}
      XEM_REGISTRATION_NAME: ${XEROTIER_AGENT_REGISTRATION_NAME:?XEROTIER_AGENT_REGISTRATION_NAME is required}
      # Agent configuration (defaulted by image; override as needed)
      XEM_LOG_LEVEL: ${XEM_AGENT_LOG_LEVEL:-info}
      XEM_MAX_CONCURRENT_EXECUTIONS: ${XEM_AGENT_MAX_CONCURRENT:-20}
      XEM_TOOLS_DIR: /var/lib/xerotier/tools
      XEM_CREDENTIALS_DIR: /var/lib/xerotier/credentials
      XEM_SIGNING_KEY_PATH: /var/lib/xem/.config/xerotier/agent-signing-key.hex
    volumes:
      # Tool bundles and workspace credentials (operator-managed)
      - /data/xerotier-xem/tools:/var/lib/xerotier/tools:ro
      - /data/xerotier-xem/credentials:/var/lib/xerotier/credentials:ro
      # Runtime state (leases, queues, offline fail-safe)
      - /data/xerotier-xem/state:/var/lib/xerotier/state
      # Persistent signing key + enrollment state
      - /data/xerotier-xem/config:/var/lib/xem/.config/xerotier

networks: {}
